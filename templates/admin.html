<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard | HealthMate</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #0d0d0d, #090a1a, #0b0c25);
      color: white;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    h1 {
      text-align: center;
      margin: 40px 0 20px;
      font-weight: 600;
      font-size: 2.8rem;
      color: #00ffcc;
      text-shadow: 0 0 15px #00ffcc;
    }

    .dashboard-container {
      max-width: 95%;
      margin: auto;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 25px rgba(0, 255, 204, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: white;
    }

    thead th {
      background: rgba(0, 255, 204, 0.2);
      padding: 12px 15px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      border-bottom: 2px solid #00ffcc;
    }

    tbody td {
      padding: 12px 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      font-weight: 500;
    }

    tbody tr:hover {
      background: rgba(0, 255, 204, 0.1);
      transform: scale(1.02);
      transition: 0.3s ease;
      cursor: default;
    }

    .btn-logout {
      display: block;
      margin: 30px auto 40px;
      padding: 12px 40px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #000;
      background: linear-gradient(90deg, #00ffcc, #0077ff);
      border: none;
      border-radius: 50px;
      box-shadow: 0 0 20px #00ffcc;
      transition: all 0.3s ease-in-out;
      cursor: pointer;
    }

    .btn-logout:hover {
      box-shadow: 0 0 40px #00ffcc;
      transform: scale(1.05);
      background: linear-gradient(90deg, #0077ff, #00ffcc);
      color: #fff;
    }

    footer {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 30px;
      user-select: none;
    }
  </style>
</head>
<body>

  <h1>👑 Admin Dashboard</h1>

  <div class="dashboard-container">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Password (hashed)</th>
          <th>Admin?</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ user.id }}</td>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.password }}</td>
          <td>{{ "Yes" if user.is_admin else "No" }}</td>
          <td>
            <a href="{{ url_for('admin_user_records', user_id=user.id) }}" class="btn btn-sm btn-outline-info">View Records</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <button class="btn-logout" onclick="window.location.href='/logout'">Logout</button>

  <footer>
    © 2025 HealthMate | Made by Prince
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
