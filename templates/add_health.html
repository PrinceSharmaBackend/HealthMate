{% extends "base.html" %}
{% block content %}
<style>
  body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
  }
  .health-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
    padding: 30px;
    margin-top: 50px;
    animation: fadeIn 1s ease-in-out;
  }
  h2 {
    text-align: center;
    font-weight: 600;
    color: #00ffcc;
    text-shadow: 0px 0px 10px #00ffcc;
  }
  label {
    font-weight: 500;
  }
  input, select {
    background: rgba(255, 255, 255, 0.2);
    border: none;
    color: white;
  }
  input:focus, select:focus {
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 10px #00ffcc;
    outline: none;
  }
  .btn-glow {
    background: linear-gradient(90deg, #00ffcc, #0077ff);
    border: none;
    color: white;
    font-weight: 600;
    box-shadow: 0px 0px 15px #00ffcc;
    transition: 0.3s;
  }
  .btn-glow:hover {
    box-shadow: 0px 0px 30px #00ffcc;
    transform: scale(1.03);
  }
  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(-20px);}
    to {opacity: 1; transform: translateY(0);}
  }
</style>

<div class="container">
  <div class="col-md-8 offset-md-2 health-card">
    <h2>Add Your Health Data 🩺</h2>
    <form method="POST">
    
      <!-- New Fields Start -->
      <div class="row">
        <div class="col-md-4 mb-3">
          <label>Age</label>
          <input type="number" name="age" class="form-control" required>
        </div>
        <div class="col-md-4 mb-3">
          <label>Gender</label>
          <select name="gender" class="form-control" required>
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label>Body Temperature (°C)</label>
          <input type="number" step="0.1" name="temperature" class="form-control" required>
        </div>
      </div>
      <!-- New Fields End -->

      <div class="row">
        <div class="col-md-6 mb-3">
          <label>Weight (kg)</label>
          <input type="number" step="0.1" name="weight" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label>Height (cm)</label>
          <input type="number" step="0.1" name="height" class="form-control" required>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label>BP Systolic</label>
          <input type="number" name="bp_sys" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label>BP Diastolic</label>
          <input type="number" name="bp_dia" class="form-control" required>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label>Heart Rate (BPM)</label>
          <input type="number" name="heart_rate" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
          <label>Sugar Level (mg/dL)</label>
          <input type="number" step="0.1" name="sugar" class="form-control" required>
        </div>
      </div>

      <button type="submit" class="btn btn-glow w-100 mt-2">💾 Add Record</button>
    </form>
  </div>
</div>
{% endblock %}
