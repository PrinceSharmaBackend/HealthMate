{% extends "base.html" %}
{% block content %}
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
  }

  .container {
    max-width: 700px;
    margin: 50px auto;
    background: rgba(255, 255, 255, 0.05);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  h2 {
    text-align: center;
    color: #39ff14;
    text-shadow: 0 0 10px #39ff14;
    margin-bottom: 30px;
  }

  p {
    font-size: 1.1rem;
    margin: 15px 0;
    line-height: 1.5;
  }

  .score {
    font-weight: bold;
    font-size: 1.3rem;
    text-align: center;
    margin-top: 20px;
  }

  .btn-glow {
    background: linear-gradient(90deg, #00ffcc, #0077ff);
    border: none;
    color: white;
    font-weight: 600;
    box-shadow: 0px 0px 15px #00ffcc;
    transition: 0.3s;
    padding: 12px;
    border-radius: 7px;
    cursor: pointer;
    text-align: center;
    display: block;
    width: 100%;
    max-width: 280px;
    margin: 20px auto 0;
    text-decoration: none;
  }

  .btn-glow:hover {
    box-shadow: 0px 0px 30px #00ffcc;
    transform: scale(1.03);
  }
</style>

<div class="container">
  <h2>Mental Health Report</h2>
  <p><strong>Name:</strong> {{ name }}</p>
  <p><strong>Date:</strong> {{ record.date.strftime('%Y-%m-%d') }}</p>
  <p class="score">Score: {{ record.score }}/5</p>
  <p><strong>Summary:</strong> {{ record.summary }}</p>

  <a href="{{ url_for('download_mental_health_pdf', record_id=record.id) }}" class="btn-glow">⬇️ Download PDF Report</a>
  <a href="{{ url_for('dashboard') }}" class="btn-glow">⬅️ Back to User Dashboard</a>
</div>
{% endblock %}
